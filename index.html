<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Aday Habits">
<meta name="theme-color" content="#111118">
<title>Aday Habits</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#111118;--surface:#1a1a26;--border:rgba(255,255,255,0.07);
  --text:#e8e8f0;--muted:#6b6b88;--accent:#7c6fff;--gold:#f5c842;
  --green:#4ade80;--radius:16px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased;}
body{display:flex;flex-direction:column;min-height:100vh;padding-bottom:env(safe-area-inset-bottom);}

header{padding:16px 20px 14px;padding-top:calc(16px + env(safe-area-inset-top));background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
header h1{font-size:18px;font-weight:700;color:var(--accent);}
.date-label{font-size:12px;color:var(--muted);}

.main{flex:1;padding:16px;display:flex;flex-direction:column;gap:16px;max-width:480px;margin:0 auto;width:100%;}

.avatar-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;display:flex;align-items:center;gap:18px;position:relative;overflow:hidden;transition:box-shadow 0.4s;}
.avatar-card.glowing{box-shadow:0 0 24px 4px rgba(244,114,182,0.2);}
#avatarCanvas{image-rendering:pixelated;image-rendering:crisp-edges;display:block;flex-shrink:0;}

.avatar-info{flex:1;min-width:0;}
.avatar-mood{font-size:18px;font-weight:700;color:var(--text);margin-bottom:2px;}
.avatar-sub{font-size:12px;color:var(--muted);margin-bottom:10px;}

.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.chip{font-size:11px;padding:3px 8px;border-radius:20px;border:1px solid var(--border);color:var(--muted);transition:all 0.3s;white-space:nowrap;}
.chip.on{color:#111;border-color:transparent;}
.chip.morning.on{background:#fbbf24;}
.chip.money.on{background:#4ade80;}
.chip.stretch.on{background:#60a5fa;}
.chip.study.on{background:#a78bfa;}
.chip.clean.on{background:#34d399;}
.chip.glow.on{background:linear-gradient(90deg,#f472b6,#a78bfa,#60a5fa);color:#fff;}

.streak{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--gold);background:rgba(245,200,66,0.08);border:1px solid rgba(245,200,66,0.18);border-radius:20px;padding:3px 10px;}

.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.section-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}

.habits-list{display:flex;flex-direction:column;gap:10px;}
.habit-item{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:13px 15px;display:flex;align-items:center;gap:13px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:border-color 0.25s,background 0.25s;position:relative;overflow:hidden;}
.habit-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;}
.habit-item.morning::before{background:#fbbf24;}
.habit-item.money::before{background:#4ade80;}
.habit-item.stretch::before{background:#60a5fa;}
.habit-item.study::before{background:#a78bfa;}
.habit-item.clean::before{background:#34d399;}
.habit-item.glow::before{background:linear-gradient(180deg,#f472b6,#a78bfa,#60a5fa);}
.habit-item.done{background:rgba(255,255,255,0.02);}
.habit-item.done.morning{border-color:rgba(251,191,36,0.3);}
.habit-item.done.money{border-color:rgba(74,222,128,0.3);}
.habit-item.done.stretch{border-color:rgba(96,165,250,0.3);}
.habit-item.done.study{border-color:rgba(167,139,250,0.3);}
.habit-item.done.clean{border-color:rgba(52,211,153,0.3);}
.habit-item.done.glow{border-color:rgba(244,114,182,0.35);}

.habit-icon{font-size:20px;width:26px;text-align:center;flex-shrink:0;}
.habit-text{flex:1;min-width:0;}
.habit-name{font-size:15px;color:var(--text);transition:color 0.2s;}
.habit-desc{font-size:11px;color:var(--muted);margin-top:1px;}
.habit-item.done .habit-name{color:var(--muted);text-decoration:line-through;}

.checkmark{width:24px;height:24px;border-radius:50%;border:2px solid var(--muted);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.2s;pointer-events:none;}
.habit-item.done .checkmark{border-color:transparent;}
.habit-item.done.morning .checkmark{background:#fbbf24;}
.habit-item.done.money .checkmark{background:#4ade80;}
.habit-item.done.stretch .checkmark{background:#60a5fa;}
.habit-item.done.study .checkmark{background:#a78bfa;}
.habit-item.done.clean .checkmark{background:#34d399;}
.habit-item.done.glow .checkmark{background:linear-gradient(135deg,#f472b6,#a78bfa);}
.checkmark::after{content:'';display:none;width:5px;height:9px;border-right:2.5px solid #111;border-bottom:2.5px solid #111;transform:rotate(45deg) translate(-1px,-1px);}
.habit-item.done .checkmark::after{display:block;}

.confetti-overlay{position:fixed;inset:0;pointer-events:none;z-index:200;}

/* Tab nav */
.tabbar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);}
.tab-btn{flex:1;padding:11px 0;background:none;border:none;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;border-bottom:2px solid transparent;transition:color 0.2s,border-color 0.2s;}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.page{display:none;}
.page.active{display:flex;flex-direction:column;gap:16px;}

/* Points balance */
.points-card{background:linear-gradient(135deg,#1a1a2e,#22223a);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center;}
.points-val{font-size:38px;font-weight:800;color:var(--gold);line-height:1;}
.points-label{font-size:12px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:1px;}
.points-hint{font-size:12px;color:var(--muted);margin-top:10px;}

/* Rewards list */
.rewards-list{display:flex;flex-direction:column;gap:10px;}
.reward-item{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:13px 15px;display:flex;align-items:center;gap:13px;}
.reward-icon{font-size:20px;width:26px;text-align:center;flex-shrink:0;}
.reward-text{flex:1;min-width:0;}
.reward-name{font-size:15px;color:var(--text);}
.reward-cost{font-size:12px;color:var(--gold);margin-top:1px;font-weight:600;}
.reward-actions{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.btn-redeem{padding:7px 14px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.btn-redeem:disabled{background:#3a3a4a;color:var(--muted);cursor:not-allowed;}
.btn-edit,.btn-del{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:4px 6px;-webkit-tap-highlight-color:transparent;}
.btn-del:active{color:#e94560;}
.btn-edit:active{color:var(--accent);}

.add-reward-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:13px;background:var(--surface);border:1px dashed var(--border);border-radius:14px;color:var(--accent);font-size:14px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;}

/* History */
.history-list{display:flex;flex-direction:column;gap:8px;}
.history-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:12px;font-size:13px;}
.history-name{color:var(--text);}
.history-meta{color:var(--muted);font-size:11px;margin-top:2px;}
.history-cost{color:#f87171;font-weight:600;font-size:13px;}
.empty-hist{text-align:center;color:var(--muted);font-size:13px;padding:20px 0;}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:300;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:18px 18px 0 0;border:1px solid var(--border);border-bottom:none;padding:20px;padding-bottom:calc(20px + env(safe-area-inset-bottom));width:100%;max-width:480px;animation:slideUp 0.25s ease;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal h2{font-size:16px;font-weight:600;margin-bottom:14px;color:var(--text);}
.modal label{font-size:12px;color:var(--muted);margin-bottom:5px;display:block;}
.modal input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:13px;font-size:16px;color:var(--text);outline:none;margin-bottom:14px;-webkit-appearance:none;}
.modal input:focus{border-color:var(--accent);}
.modal-btns{display:flex;gap:10px;}
.btn-cancel{flex:1;padding:13px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--muted);font-size:15px;cursor:pointer;}
.btn-confirm{flex:2;padding:13px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;}

.emoji-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.emoji-pick{font-size:20px;padding:7px 10px;border-radius:10px;background:var(--bg);border:1px solid var(--border);cursor:pointer;}
.emoji-pick.sel{border-color:var(--accent);background:rgba(124,111,255,0.15);}
</style>
</head>
<body>
<header>
  <h1>Aday's Day</h1>
  <div class="date-label" id="dateLabel"></div>
</header>
<div class="tabbar">
  <button class="tab-btn active" id="tab-habits" onclick="switchTab('habits')">Habits</button>
  <button class="tab-btn" id="tab-rewards" onclick="switchTab('rewards')">Rewards</button>
  <button class="tab-btn" id="tab-history" onclick="switchTab('history')">History</button>
</div>
<div class="main">

  <!-- HABITS PAGE -->
  <div class="page active" id="page-habits">
    <div class="avatar-card" id="avatarCard">
      <canvas id="avatarCanvas" width="160" height="200"></canvas>
      <div class="avatar-info">
        <div class="avatar-mood" id="avatarMood">Let's go 💪</div>
        <div class="avatar-sub" id="avatarSub">Start your quests</div>
        <div class="chips">
          <span class="chip morning" id="chip-morning">☀️ Fresh</span>
          <span class="chip money"   id="chip-money">💸 Paid</span>
          <span class="chip stretch" id="chip-stretch">🧘 Chill</span>
          <span class="chip study"   id="chip-study">📖 Smart</span>
          <span class="chip clean"   id="chip-clean">🚭 Clean</span>
          <span class="chip glow"    id="chip-glow">✨ Glow</span>
        </div>
        <div class="streak">🔥 <span id="streakVal">0</span> day streak</div>
        <div id="levelBadge" style="display:inline-flex;align-items:center;margin-top:6px;font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;border:1px solid rgba(255,255,255,0.1);color:#888;letter-spacing:0.3px;">Lv.1 Beginner</div>
        <div style="margin-top:6px;">
          <div style="height:4px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden;">
            <div id="xpBarFill" style="height:100%;width:0%;border-radius:2px;transition:width 0.5s ease;background:#888;"></div>
          </div>
          <div id="xpBarLabel" style="font-size:10px;color:var(--muted);margin-top:3px;">0/100 XP to Lv.2</div>
        </div>
      </div>
    </div>
    <div>
      <div class="section-header">
        <span class="section-title">Today's Quests</span>
      </div>
      <div class="habits-list" id="habitList"></div>
    </div>
  </div>

  <!-- REWARDS PAGE -->
  <div class="page" id="page-rewards">
    <div class="points-card">
      <div class="points-val" id="pointsVal">0</div>
      <div class="points-label">Points</div>
      <div class="points-hint">Complete all habits in a day → +100 points</div>
    </div>
    <div>
      <div class="section-header">
        <span class="section-title">Reward Shop</span>
      </div>
      <div class="rewards-list" id="rewardsList"></div>
      <div style="margin-top:10px;">
        <button class="add-reward-btn" onclick="openRewardModal()">+ Add new reward</button>
      </div>
    </div>
  </div>

  <!-- HISTORY PAGE -->
  <div class="page" id="page-history">
    <div>
      <div class="section-header">
        <span class="section-title">Redemption History</span>
      </div>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>

</div>
<canvas class="confetti-overlay" id="confettiCanvas"></canvas>

<!-- Add/Edit Reward Modal -->
<div class="modal-overlay" id="rewardModalOverlay" onclick="if(event.target===this)closeRewardModal()">
  <div class="modal">
    <h2 id="rewardModalTitle">New Reward</h2>
    <div class="emoji-row" id="emojiRow"></div>
    <label>Reward name</label>
    <input id="rewardNameInput" type="text" placeholder="e.g. YouTube 1 hour" maxlength="40" autocomplete="off" />
    <label>Cost (points)</label>
    <input id="rewardCostInput" type="number" inputmode="numeric" placeholder="e.g. 100" min="1" />
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeRewardModal()">Cancel</button>
      <button class="btn-confirm" onclick="confirmRewardSave()">Save</button>
    </div>
  </div>
</div>

<script>
// ── GITHUB STORAGE CONFIG ────────────────────────────────
const GH_TOKEN='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';
const GH_OWNER='adaitkul';
const GH_REPO='tamagotchi-habits';
const GH_FILE='progress.json';
const GH_API=`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_FILE}`;

let ghSha=null; // needed for updates
let saveTimer=null;
let isSyncing=false;

function showSyncStatus(msg, color){
  let el=document.getElementById('syncStatus');
  if(!el){
    el=document.createElement('div');
    el.id='syncStatus';
    el.style.cssText='position:fixed;bottom:calc(12px + env(safe-area-inset-bottom));right:12px;font-size:11px;padding:4px 10px;border-radius:20px;background:rgba(0,0,0,0.6);color:#fff;z-index:400;transition:opacity 0.4s;pointer-events:none;';
    document.body.appendChild(el);
  }
  el.textContent=msg;
  el.style.color=color||'#aaa';
  el.style.opacity='1';
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.style.opacity='0',2500);
}

async function ghLoad(){
  try{
    showSyncStatus('⏳ Loading...','#aaa');
    const res=await fetch(GH_API,{
      headers:{'Authorization':`token ${GH_TOKEN}`,'Accept':'application/vnd.github.v3+json'}
    });
    if(res.status===404){
      // first time — no file yet, start fresh
      showSyncStatus('✓ Ready','#4ade80');
      return null;
    }
    if(!res.ok) throw new Error('Load failed: '+res.status);
    const json=await res.json();
    ghSha=json.sha;
    const data=JSON.parse(atob(json.content.replace(/\n/g,'')));
    showSyncStatus('✓ Synced','#4ade80');
    return data;
  }catch(e){
    showSyncStatus('⚠ Offline','#f87171');
    console.error('ghLoad error',e);
    return null;
  }
}

async function ghSave(data){
  if(isSyncing)return;
  isSyncing=true;
  try{
    showSyncStatus('💾 Saving...','#f5c842');
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));
    const body={message:'progress update',content};
    if(ghSha) body.sha=ghSha;
    const res=await fetch(GH_API,{
      method:'PUT',
      headers:{'Authorization':`token ${GH_TOKEN}`,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if(!res.ok) throw new Error('Save failed: '+res.status);
    const json=await res.json();
    ghSha=json.content.sha;
    showSyncStatus('✓ Saved','#4ade80');
  }catch(e){
    showSyncStatus('⚠ Save failed','#f87171');
    console.error('ghSave error',e);
  }finally{
    isSyncing=false;
  }
}

function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>ghSave(buildSaveData()),800);
}

function buildSaveData(){
  return{
    version:1,
    lastSaved:new Date().toISOString(),
    habits:{date:TODAY,state},
    streak:{streak,last:localStorage.getItem('_streakLast')||''},
    points,
    lifetimeXP,
    rewards,
    history,
    awardedDates:JSON.parse(localStorage.getItem(POINTS_AWARDED_KEY)||'[]'),
    penalizedDates:JSON.parse(localStorage.getItem(PENALIZED_KEY)||'[]'),
  };
}

function applyLoadedData(data){
  if(!data)return;

  // habits / state
  if(data.habits){
    if(data.habits.date===TODAY){
      state=data.habits.state||{};
    } else {
      // day rolled over
      const prevState=data.habits.state||{};
      const allDone=HABITS.every(h=>prevState[h.id]);
      const noneDone=HABITS.every(h=>!prevState[h.id]);
      const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
      const lastStreak=data.streak||{streak:0,last:''};

      if(noneDone){
        applyPenaltyFromData(data.habits.date, data);
        streak=0;
      } else if(allDone){
        streak=(lastStreak.last===yesterday.toDateString())?lastStreak.streak+1:1;
      } else {
        streak=0;
      }
      state={};
    }
  }

  // streak
  if(data.habits&&data.habits.date!==TODAY){
    // already handled above
  } else if(data.streak){
    streak=data.streak.streak||0;
    localStorage.setItem('_streakLast',data.streak.last||'');
  }

  // points & XP
  points=data.points||0;
  lifetimeXP=data.lifetimeXP||0;

  // rewards
  rewards=data.rewards&&data.rewards.length?data.rewards:DEFAULT_REWARDS.slice();

  // history
  history=data.history||[];

  // awarded/penalized dates back to localStorage for quick checks
  if(data.awardedDates) localStorage.setItem(POINTS_AWARDED_KEY,JSON.stringify(data.awardedDates));
  if(data.penalizedDates) localStorage.setItem(PENALIZED_KEY,JSON.stringify(data.penalizedDates));
}

function applyPenaltyFromData(missedDate, data){
  const penalizedDates=data.penalizedDates||[];
  if(penalizedDates.includes(missedDate))return;
  points=Math.max(0,(data.points||0)-PENALTY_AMOUNT);
  penalizedDates.push(missedDate);
  localStorage.setItem(PENALIZED_KEY,JSON.stringify(penalizedDates));
  pendingPenaltyNotice={date:missedDate,amount:PENALTY_AMOUNT};
}

// ── STORAGE KEYS (kept for awarded/penalized quick checks) ─
const STORAGE_KEY='adayHabits_v3';
const STREAK_KEY='adayStreak_v3';
const POINTS_KEY='adayPoints_v1';
const REWARDS_KEY='adayRewards_v1';
const HISTORY_KEY='adayHistory_v1';
const POINTS_AWARDED_KEY='adayPointsAwarded_v1';
const PENALIZED_KEY='adayPenalized_v1';
const PENALTY_AMOUNT=50;
const TODAY=new Date().toDateString();

const DEFAULT_REWARDS=[
  {id:'r1',icon:'📺',name:'YouTube 1 hour',cost:100},
  {id:'r2',icon:'🎮',name:'Gaming 1 hour',cost:100},
  {id:'r3',icon:'🍕',name:'Treat meal',cost:150},
  {id:'r4',icon:'😴',name:'Sleep in / lazy morning',cost:200},
];

const EMOJI_CHOICES=['🎁','📺','🎮','🍕','🍔','☕','🛍️','😴','🎬','🎵','🍫','🛌','🚗','✈️','📱','💆'];

let state={};
let streak=0;
let confettiActive=false;
let points=0;
let lifetimeXP=0;
let rewards=[];
let history=[];
let editingRewardId=null;
let selectedEmoji=EMOJI_CHOICES[0];
let pendingPenaltyNotice=null;

const LIFETIME_XP_KEY='adayLifetimeXP_v1';
const LEVEL_THRESHOLDS=[0,100,250,500,1000,2000,4000];
// L1=0, L2=100, L3=250, L4=500, L5=1000, L6=2000, L7=4000

function getLevel(xp){
  let lvl=1;
  for(let i=1;i<LEVEL_THRESHOLDS.length;i++){
    if(xp>=LEVEL_THRESHOLDS[i])lvl=i+1; else break;
  }
  return lvl;
}

function getLevelProgress(xp){
  const lvl=getLevel(xp);
  const idx=lvl-1;
  const current=LEVEL_THRESHOLDS[idx]||0;
  const next=LEVEL_THRESHOLDS[idx+1];
  if(!next)return{lvl,pct:100,current:xp,needed:0}; // max level
  const pct=Math.round(((xp-current)/(next-current))*100);
  return{lvl,pct,current:xp-current,needed:next-current};
}

const LEVEL_NAMES=['','Beginner','Trainee','Warrior','Champion','Legend','Mythic','God Mode'];
const LEVEL_COLORS=['','#888','#60a5fa','#4ade80','#a78bfa','#f5c842','#f472b6','#fff'];

function switchTab(name){
  ['habits','rewards','history'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('active',t===name);
    document.getElementById('page-'+t).classList.toggle('active',t===name);
  });
  if(name==='rewards')renderRewards();
  if(name==='history')renderHistory();
}

function loadPointsData(){
  // data already applied via applyLoadedData on boot — this is a no-op now
}

function savePoints(){ scheduleSave(); }
function saveRewards(){ scheduleSave(); }
function saveHistory(){ scheduleSave(); }

function maybeAwardDailyPoints(){
  const allDone=HABITS.every(h=>state[h.id]);
  if(!allDone)return;
  let awardedDates=[];
  try{ awardedDates=JSON.parse(localStorage.getItem(POINTS_AWARDED_KEY)||'[]'); }catch(e){}
  if(awardedDates.includes(TODAY))return;
  const prevLevel=getLevel(lifetimeXP);
  points+=100;
  lifetimeXP+=100;
  const newLevel=getLevel(lifetimeXP);
  if(newLevel>prevLevel) showLevelUpBanner(newLevel);
  awardedDates.push(TODAY);
  localStorage.setItem(POINTS_AWARDED_KEY,JSON.stringify(awardedDates));
  scheduleSave();
}

const HABITS=[
  {id:'morning',icon:'☀️',name:'Morning routine',desc:'Wake up fresh, start strong',type:'morning'},
  {id:'money',  icon:'💸',name:'Earn 1500 CZK',  desc:'Delivery shift done',       type:'money'},
  {id:'stretch',icon:'🧘',name:'Stretch / bend',  desc:'Body stays loose',          type:'stretch'},
  {id:'study',  icon:'📖',name:'2 study sessions',desc:'Knowledge compounds',       type:'study'},
  {id:'clean',  icon:'🚭',name:'No nicotine',      desc:'Stay clean today',          type:'clean'},
  {id:'glow',   icon:'✨',name:'Private habit',    desc:'···',                       type:'glow'},
];

function load(){
  // no-op — loading is async via ghLoad on boot
}

function applyMissedDayPenalty(missedDate){
  let penalizedDates=[];
  try{ penalizedDates=JSON.parse(localStorage.getItem(PENALIZED_KEY)||'[]'); }catch(e){}
  if(penalizedDates.includes(missedDate))return;
  points=Math.max(0,points-PENALTY_AMOUNT);
  penalizedDates.push(missedDate);
  localStorage.setItem(PENALIZED_KEY,JSON.stringify(penalizedDates));
  pendingPenaltyNotice={date:missedDate,amount:PENALTY_AMOUNT};
  scheduleSave();
}

function save(){
  scheduleSave();
}

function toggle(id){
  state[id]=!state[id];
  const allDone=HABITS.every(h=>state[h.id]);
  if(allDone){
    const sk=JSON.parse(localStorage.getItem(STREAK_KEY)||'{"streak":0,"last":""}');
    if(sk.last!==TODAY){
      const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
      streak=(sk.last===yesterday.toDateString())?sk.streak+1:1;
    }
    maybeAwardDailyPoints();
    fireConfetti();
  }
  save();render();
}

function getMoodIdx(){
  const done=HABITS.filter(h=>state[h.id]).length;
  if(done===0)return 0;
  if(done===1)return 1;
  if(done===2)return 2;
  if(done===3)return 3;
  if(done<=5)return 4;
  return 5;
}

function render(){
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const now=new Date();
  document.getElementById('dateLabel').textContent=`${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;

  HABITS.forEach(h=>{
    const c=document.getElementById('chip-'+h.id);
    if(c)c.classList.toggle('on',!!state[h.id]);
  });
  document.getElementById('streakVal').textContent=streak;

  // Level badge
  const {lvl,pct,current,needed}=getLevelProgress(lifetimeXP);
  const lvlColor=LEVEL_COLORS[Math.min(lvl,LEVEL_COLORS.length-1)];
  const lvlName=LEVEL_NAMES[Math.min(lvl,LEVEL_NAMES.length-1)];
  document.getElementById('levelBadge').textContent=`Lv.${lvl} ${lvlName}`;
  document.getElementById('levelBadge').style.color=lvlColor;
  document.getElementById('levelBadge').style.borderColor=lvlColor+'44';
  document.getElementById('levelBadge').style.background=lvlColor+'12';
  const xpBar=document.getElementById('xpBarFill');
  xpBar.style.width=pct+'%';
  xpBar.style.background=lvlColor;
  document.getElementById('xpBarLabel').textContent= needed>0 ? `${current}/${needed} XP to Lv.${lvl+1}` : '★ Max Level';

  // Penalty notice
  if(pendingPenaltyNotice){
    showPenaltyBanner(pendingPenaltyNotice.amount);
    pendingPenaltyNotice=null;
  }

  const done=HABITS.filter(h=>state[h.id]).length;
  const moods=['💀 Dead...','😢 Rough day','😐 Meh','🙂 Getting there','😄 Strong!','🌟 Legendary!'];
  const subs=['Do at least one thing bro','Keep going, one more','Halfway there','Almost strong','One more quest!','Perfect day. Glory!'];
  document.getElementById('avatarMood').textContent=moods[getMoodIdx()];
  document.getElementById('avatarSub').textContent=subs[Math.min(done,6)-1]||'Start your quests';

  document.getElementById('avatarCard').classList.toggle('glowing',!!state['glow']);

  const list=document.getElementById('habitList');
  list.innerHTML='';
  HABITS.forEach(h=>{
    const el=document.createElement('div');
    el.className=`habit-item ${h.type}${state[h.id]?' done':''}`;
    el.onclick=()=>toggle(h.id);
    el.innerHTML=`<div class="habit-icon">${h.icon}</div><div class="habit-text"><div class="habit-name">${h.name}</div><div class="habit-desc">${h.desc}</div></div><div class="checkmark"></div>`;
    list.appendChild(el);
  });
}

function showLevelUpBanner(lvl){
  const color=LEVEL_COLORS[Math.min(lvl,LEVEL_COLORS.length-1)];
  const name=LEVEL_NAMES[Math.min(lvl,LEVEL_NAMES.length-1)];
  showBanner(`🎉 Level Up! You are now Lv.${lvl} ${name}`,color);
}

function showPenaltyBanner(amount){
  showBanner(`😤 -${amount} pts — you skipped yesterday entirely. Don't do that again!`,'#f87171');
}

function showBanner(msg, color){
  let b=document.getElementById('toastBanner');
  if(!b){
    b=document.createElement('div');
    b.id='toastBanner';
    b.style.cssText='position:fixed;top:env(safe-area-inset-top,16px);left:50%;transform:translateX(-50%);z-index:500;padding:12px 20px;border-radius:14px;font-size:14px;font-weight:600;color:#fff;text-align:center;max-width:90%;transition:opacity 0.4s;pointer-events:none;';
    document.body.appendChild(b);
  }
  b.textContent=msg;
  b.style.background=color||'#7c6fff';
  b.style.opacity='1';
  clearTimeout(b._timer);
  b._timer=setTimeout(()=>b.style.opacity='0',3500);
}

// ── PIXEL AVATAR ──────────────────────────────────────────
const S=10;
function drawAvatar(t){
  const canvas=document.getElementById('avatarCanvas');
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.imageSmoothingEnabled=false;

  const moodIdx=getMoodIdx();
  const lvl=getLevel(lifetimeXP);
  const morning=!!state['morning'],money=!!state['money'],stretch=!!state['stretch'];
  const study=!!state['study'],clean=!!state['clean'],glow=!!state['glow'];

  function px(x,y,w,h,c,a){ctx.globalAlpha=a??1;ctx.fillStyle=c;ctx.fillRect(x*S,y*S,(w||1)*S,(h||1)*S);ctx.globalAlpha=1;}

  // L6+ permanent legendary aura (independent of glow habit)
  if(lvl>=6){
    const a=0.15+0.08*Math.sin(t/600);
    const g=ctx.createRadialGradient(canvas.width/2,canvas.height*0.36,2,canvas.width/2,canvas.height*0.36,canvas.width*0.6);
    const auraColor=lvl>=7?`rgba(255,255,255,${a})`:`rgba(245,200,66,${a})`;
    g.addColorStop(0,auraColor);
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;ctx.fillRect(0,0,canvas.width,canvas.height);
  }

  // private habit glow (pink/purple)
  if(glow){
    const a=0.2+0.1*Math.sin(t/500);
    const g=ctx.createRadialGradient(canvas.width/2,canvas.height*0.36,2,canvas.width/2,canvas.height*0.36,canvas.width*0.55);
    g.addColorStop(0,`rgba(244,114,182,${a})`);
    g.addColorStop(0.6,`rgba(167,139,250,${a*0.4})`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;ctx.fillRect(0,0,canvas.width,canvas.height);
  }

  // rain
  if(moodIdx<=1){
    for(let i=0;i<5;i++){
      const rx=(1.5+i*3)*S;
      const ry=((t/200+i*4.1)%20)*S;
      ctx.fillStyle='#80b8d8';ctx.globalAlpha=0.25;
      ctx.fillRect(rx,ry,2,S);ctx.globalAlpha=1;
    }
  }

  const OL='#1a1008';

  // HEAD OUTLINE
  px(3,0,10,1,OL);px(2,1,12,1,OL);
  px(1,2,14,9,OL);px(2,11,12,1,OL);px(3,12,10,1,OL);

  // HAIR — base dark, with level-based highlights
  const H1='#1c1208';
  const H2= lvl>=5?'#c09820': lvl>=4?'#4a6aaa': lvl>=3?'#3a4a7a':'#2a1c0e';
  const H3= lvl>=5?'#f0c040': lvl>=4?'#6080cc': lvl>=3?'#5060a0':'#382810';
  px(3,0,10,1,H1);px(2,1,12,1,H1);
  px(1,2,14,4,H1);
  px(1,6,2,4,H1);px(13,6,2,4,H1);
  px(1,9,1,2,H1);px(14,9,1,2,H1);
  px(5,1,4,1,H3);px(4,2,3,1,H3);px(7,1,1,2,H2);px(11,2,2,1,H2);
  // L6+ glowing crown hint
  if(lvl>=6){
    const ca=0.6+0.4*Math.sin(t/400);
    ctx.fillStyle=lvl>=7?'#fff':'#f0c040'; ctx.globalAlpha=ca;
    ctx.fillRect(6*S,0,S,3); ctx.fillRect(9*S,0,S,3);
    ctx.globalAlpha=1;
  }

  // SKIN
  const sk0=moodIdx===0?'#b08060':moodIdx===1?'#c89868':'#eaab70';
  const sk1=moodIdx===0?'#987050':moodIdx===1?'#a87858':'#c88a50';
  const sk2=moodIdx===0?'#785038':'#a06840';

  px(3,4,10,7,sk0);px(2,5,12,5,sk0);px(1,6,14,3,sk0);
  px(1,6,1,3,sk1);px(14,6,1,3,sk1);
  px(2,9,12,1,sk1);px(3,10,10,2,sk1);px(4,11,8,1,sk2);px(5,12,6,1,sk2);
  px(0,7,1,2,sk1);px(15,7,1,2,sk1);

  // EYEBROWS
  if(moodIdx<=1){px(3,5,2,1,OL);px(5,4,1,1,OL);px(10,4,1,1,OL);px(11,5,2,1,OL);}
  else if(moodIdx>=4){px(3,4,3,1,OL);px(10,4,3,1,OL);}
  else{px(3,5,3,1,OL);px(10,5,3,1,OL);}

  // EYES — small warm brown, 2px wide
  const droop=moodIdx<=1?1:0;
  const eyeY=7+droop;
  const eyeC='#5a3a20';

  if(moodIdx===0){
    ctx.strokeStyle=OL;ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(3*S+1,6*S+1);ctx.lineTo(5*S-1,8*S-1);ctx.stroke();
    ctx.beginPath();ctx.moveTo(5*S-1,6*S+1);ctx.lineTo(3*S+1,8*S-1);ctx.stroke();
    ctx.beginPath();ctx.moveTo(11*S+1,6*S+1);ctx.lineTo(13*S-1,8*S-1);ctx.stroke();
    ctx.beginPath();ctx.moveTo(13*S-1,6*S+1);ctx.lineTo(11*S+1,8*S-1);ctx.stroke();
  } else if(moodIdx===2){
    // sleepy half-closed
    ctx.fillStyle=OL;
    ctx.fillRect(3*S,eyeY*S+S/2,2*S,S/2);
    ctx.fillRect(11*S,eyeY*S+S/2,2*S,S/2);
  } else {
    px(3,eyeY,2,1,eyeC);
    ctx.fillStyle='rgba(255,255,255,0.9)';ctx.fillRect(4*S+S/2,eyeY*S,2,2);
    px(11,eyeY,2,1,eyeC);
    ctx.fillStyle='rgba(255,255,255,0.9)';ctx.fillRect(12*S+S/2,eyeY*S,2,2);
  }

  // glasses
  if(study){
    ctx.strokeStyle='#8b5cf6';ctx.lineWidth=1.5;
    ctx.strokeRect(2*S,6*S,4*S,2*S);
    ctx.strokeRect(10*S,6*S,4*S,2*S);
    ctx.beginPath();ctx.moveTo(6*S,7*S);ctx.lineTo(10*S,7*S);ctx.stroke();
  }

  // NOSE
  px(7,9,2,1,sk1);px(6,10,1,1,sk2);px(9,10,1,1,sk2);

  // MOUTH
  if(moodIdx===0){px(5,11,6,1,sk2);}
  else if(moodIdx===1){px(6,12,4,1,sk2);px(5,11,1,1,sk2);px(10,11,1,1,sk2);}
  else if(moodIdx===2){px(5,11,6,1,sk2);px(5,12,1,1,sk2);px(10,12,1,1,sk2);}
  else if(moodIdx===3){px(5,11,6,1,sk2);}
  else if(moodIdx===4){px(5,11,1,1,sk2);px(6,12,4,1,sk2);px(10,11,1,1,sk2);}
  else{
    px(4,11,1,1,sk2);px(5,12,6,1,sk2);px(11,11,1,1,sk2);
    px(5,12,6,1,'#b04040',0.4);
    ctx.fillStyle='rgba(255,255,240,0.5)';ctx.fillRect(5*S,12*S,5*S,S*0.4);
  }

  // blush
  const bA=moodIdx>=4?0.22:moodIdx<=1?0.1:0.08;
  const bC=moodIdx<=1?'#6878b8':'#d85858';
  ctx.fillStyle=bC;ctx.globalAlpha=bA;
  ctx.beginPath();ctx.ellipse(2.5*S,9*S,S*0.7,S*0.35,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(13.5*S,9*S,S*0.7,S*0.35,0,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;

  // tears
  if(moodIdx>=1&&moodIdx<=2){
    const ty=9*S+((t/350)%(2*S));
    ctx.fillStyle='#78b8e0';ctx.globalAlpha=0.7;
    ctx.fillRect(4*S,ty,2,S*0.7);
    if(moodIdx===1){ctx.fillRect(11*S,ty+S*0.4,2,S*0.7);}
    ctx.globalAlpha=1;
  }

  // sweat drop dead
  if(moodIdx===0){
    ctx.fillStyle='#78b8e0';ctx.globalAlpha=0.55;
    ctx.fillRect(14*S,3*S,3,6);ctx.fillRect(14*S-3,4*S,3,4);
    ctx.globalAlpha=1;
  }

  // NECK
  px(6,13,4,1,sk0);

  // OUTFIT — shirt/hoodie/jacket changes by level
  // L1-2: white tee, L3: dark tee, L4: hoodie (navy), L5: jacket (deep purple), L6+: golden trim jacket
  const outfitMain = lvl>=6?'#2a2010': lvl>=5?'#1e1030': lvl>=4?'#1a2040': lvl>=3?'#2a2a3a':'#eeeef5';
  const outfitSide = lvl>=6?'#1a1208': lvl>=5?'#140820': lvl>=4?'#101828': lvl>=3?'#1a1a28':'#c6c6d6';
  const outfitBot  = lvl>=6?'#100e06': lvl>=5?'#0e0618': lvl>=4?'#0a1018': lvl>=3?'#111120':'#a6a6ba';
  const outfitTrim = lvl>=6?'#f0c040': lvl>=5?'#7c3aed': lvl>=4?'#3b82f6': null;

  // BODY OUTLINE
  px(2,13,12,1,OL);px(1,14,14,6,OL);px(2,20,12,1,OL);
  // shirt fill
  px(3,14,10,5,outfitMain);
  px(2,14,1,5,outfitSide);px(13,14,1,5,outfitSide);
  px(3,18,10,1,outfitBot);
  // collar
  px(6,13,4,2,outfitMain);px(7,13,2,1,outfitSide);
  // fold
  px(7,16,2,1,outfitSide);
  // trim/stripe for higher levels
  if(outfitTrim){
    px(3,14,1,5,outfitTrim,0.6); // left stripe
    px(12,14,1,5,outfitTrim,0.6); // right stripe
  }

  // ARMS
  if(stretch){
    px(0,14,1,5,OL);px(15,14,1,5,OL);
    px(0,15,1,3,outfitMain);px(15,15,1,3,outfitMain);
    px(0,18,1,1,sk0);px(15,18,1,1,sk0);
  } else {
    px(0,14,1,4,OL);px(15,14,1,4,OL);
    px(0,15,1,2,outfitMain);px(15,15,1,2,outfitMain);
    px(0,17,1,1,sk0);px(15,17,1,1,sk0);
  }
  if(moodIdx<=1){px(0,16,1,2,outfitSide);px(15,16,1,2,outfitSide);}

  // PANTS
  px(2,20,12,1,OL);
  px(2,20,5,2,'#12131e');px(9,20,5,2,'#12131e');
  px(3,20,4,1,'#2c2e4a');px(9,20,4,1,'#2c2e4a');
  px(2,21,5,1,OL);px(9,21,5,1,OL);

  // ACCESSORIES
  if(money){
    px(15,15,1,2,'#4ade80');px(15,16,1,1,'#22c55e');
    ctx.fillStyle='#14532d';ctx.font=`bold ${S-2}px monospace`;
    ctx.fillText('$',15*S+1,17*S-1);
  }
  if(study){
    px(0,15,1,3,OL);px(0,16,1,2,'#7c3aed');
    ctx.fillStyle='#ddd6fe';
    ctx.fillRect(2,16*S+3,S-4,1);ctx.fillRect(2,17*S,S-4,1);
  }
  if(clean){
    px(11,14,3,2,'#34d399');
    ctx.fillStyle='#064e3b';ctx.font=`bold ${S-2}px sans-serif`;
    ctx.fillText('✓',11*S+3,15*S+S-1);
  }
  if(morning){
    const a=0.6+0.4*Math.sin(t/400);
    ctx.fillStyle='#fbbf24';ctx.globalAlpha=a;
    ctx.fillRect(2*S,6*S,3,3);ctx.fillRect(13*S+3,6*S,3,3);
    ctx.globalAlpha=1;
  }
  if(glow){
    [[0,2],[15,1],[15,11],[0,14],[7,0]].forEach(([x,y],i)=>{
      const a=0.5+0.5*Math.sin(t/320+i*1.3);
      ctx.fillStyle=['#f472b6','#a78bfa','#60a5fa','#fbbf24'][i%4];
      ctx.globalAlpha=a;ctx.fillRect(x*S,y*S,4,4);ctx.globalAlpha=1;
    });
  }
}

// ── REWARDS ──────────────────────────────────────────────
function renderRewards(){
  document.getElementById('pointsVal').textContent=points;
  const {lvl,pct,needed}=getLevelProgress(lifetimeXP);
  const lvlName=LEVEL_NAMES[Math.min(lvl,LEVEL_NAMES.length-1)];
  const lvlColor=LEVEL_COLORS[Math.min(lvl,LEVEL_COLORS.length-1)];
  const existingInfo=document.getElementById('rewardsLevelInfo');
  if(existingInfo) existingInfo.remove();
  const card=document.querySelector('.points-card');
  const info=document.createElement('div');
  info.id='rewardsLevelInfo';
  info.style.cssText=`margin-top:10px;font-size:13px;font-weight:700;color:${lvlColor};`;
  info.textContent=`Lv.${lvl} ${lvlName} · ${lifetimeXP} total XP`;
  card.appendChild(info);
  const list=document.getElementById('rewardsList');
  list.innerHTML='';
  if(!rewards.length){
    list.innerHTML='<div class="empty-hist">No rewards yet — add one below</div>';
    return;
  }
  rewards.forEach(r=>{
    const canAfford = points>=r.cost;
    const el=document.createElement('div');
    el.className='reward-item';
    el.innerHTML=`
      <div class="reward-icon">${r.icon}</div>
      <div class="reward-text">
        <div class="reward-name">${r.name}</div>
        <div class="reward-cost">${r.cost} pts</div>
      </div>
      <div class="reward-actions">
        <button class="btn-redeem" ${canAfford?'':'disabled'} onclick="redeemReward('${r.id}')">Redeem</button>
        <button class="btn-edit" onclick="openRewardModal('${r.id}')">✎</button>
        <button class="btn-del" onclick="deleteReward('${r.id}')">✕</button>
      </div>
    `;
    list.appendChild(el);
  });
}

function redeemReward(id){
  const r=rewards.find(r=>r.id===id);
  if(!r||points<r.cost)return;
  points-=r.cost;
  savePoints();
  history.unshift({id:'h'+Date.now(),name:r.name,icon:r.icon,cost:r.cost,date:new Date().toISOString()});
  saveHistory();
  renderRewards();
  fireConfetti();
}

function deleteReward(id){
  rewards=rewards.filter(r=>r.id!==id);
  saveRewards();
  renderRewards();
}

function openRewardModal(id){
  editingRewardId=id||null;
  const titleEl=document.getElementById('rewardModalTitle');
  const nameInput=document.getElementById('rewardNameInput');
  const costInput=document.getElementById('rewardCostInput');

  if(id){
    const r=rewards.find(r=>r.id===id);
    titleEl.textContent='Edit Reward';
    nameInput.value=r.name;
    costInput.value=r.cost;
    selectedEmoji=r.icon;
  } else {
    titleEl.textContent='New Reward';
    nameInput.value='';
    costInput.value='';
    selectedEmoji=EMOJI_CHOICES[0];
  }

  const emojiRow=document.getElementById('emojiRow');
  emojiRow.innerHTML='';
  EMOJI_CHOICES.forEach(e=>{
    const btn=document.createElement('button');
    btn.type='button';
    btn.className='emoji-pick'+(e===selectedEmoji?' sel':'');
    btn.textContent=e;
    btn.onclick=()=>{
      selectedEmoji=e;
      document.querySelectorAll('.emoji-pick').forEach(b=>b.classList.remove('sel'));
      btn.classList.add('sel');
    };
    emojiRow.appendChild(btn);
  });

  document.getElementById('rewardModalOverlay').classList.add('open');
  setTimeout(()=>nameInput.focus(),300);
}

function closeRewardModal(){
  document.getElementById('rewardModalOverlay').classList.remove('open');
  editingRewardId=null;
}

function confirmRewardSave(){
  const name=document.getElementById('rewardNameInput').value.trim();
  const cost=parseInt(document.getElementById('rewardCostInput').value,10);
  if(!name||!cost||cost<1)return;

  if(editingRewardId){
    const r=rewards.find(r=>r.id===editingRewardId);
    if(r){ r.name=name; r.cost=cost; r.icon=selectedEmoji; }
  } else {
    rewards.push({id:'r'+Date.now(),icon:selectedEmoji,name,cost});
  }
  saveRewards();
  closeRewardModal();
  renderRewards();
}

// ── HISTORY ──────────────────────────────────────────────
function renderHistory(){
  const list=document.getElementById('historyList');
  list.innerHTML='';
  if(!history.length){
    list.innerHTML='<div class="empty-hist">No redemptions yet</div>';
    return;
  }
  history.forEach(h=>{
    const d=new Date(h.date);
    const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const dateStr=`${months[d.getMonth()]} ${d.getDate()}, ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
    const el=document.createElement('div');
    el.className='history-item';
    el.innerHTML=`
      <div>
        <div class="history-name">${h.icon} ${h.name}</div>
        <div class="history-meta">${dateStr}</div>
      </div>
      <div class="history-cost">-${h.cost}</div>
    `;
    list.appendChild(el);
  });
}

function fireConfetti(){
  if(confettiActive)return;confettiActive=true;
  const canvas=document.getElementById('confettiCanvas');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const ctx=canvas.getContext('2d');
  const pieces=Array.from({length:90},()=>({
    x:Math.random()*canvas.width,y:-10,
    size:6+Math.random()*8,
    color:['#f5c842','#7c6fff','#4ade80','#f472b6','#60a5fa','#34d399'][Math.floor(Math.random()*6)],
    vx:(Math.random()-0.5)*5,vy:3+Math.random()*4,
    rot:Math.random()*360,rotV:(Math.random()-0.5)*8
  }));
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.rot+=p.rotV;p.vy+=0.07;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.color;ctx.fillRect(-p.size/2,-p.size/4,p.size,p.size/2);
      ctx.restore();
    });
    frame++;
    if(frame<140)requestAnimationFrame(draw);
    else{ctx.clearRect(0,0,canvas.width,canvas.height);confettiActive=false;}
  }
  draw();
}

function loop(t){drawAvatar(t);requestAnimationFrame(loop);}

// ── BOOT ─────────────────────────────────────────────────
(async()=>{
  rewards=DEFAULT_REWARDS.slice(); // show something while loading
  render();
  requestAnimationFrame(loop);
  const data=await ghLoad();
  applyLoadedData(data);
  loadPointsData(); // no-op but keeps flow clear
  render();
  renderRewards();
})();
</script>
